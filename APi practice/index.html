<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product API Console</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">Product API <span>Console</span></div>
        </div>
        <div class="clock-badge">
            <div class="clock-dot"></div>
            PH &nbsp;<span id="time">—</span>
        </div>
    </div>

    <!-- Message -->
    <div id="message"></div>

    <!-- Main Form Card -->
    <div class="card">
        <div class="card-title">Authentication &amp; Method</div>
        <form id="api-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="token">Access token (JWT)</label>
                    <input type="text" id="token" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
                </div>
                <div class="form-group" style="max-width:160px;">
                    <label for="cars">HTTP method</label>
                    <select name="cars" id="cars">
                        <option value="get">GET</option>
                        <option value="post">POST</option>
                        <option value="put">PUT</option>
                        <option value="del">DELETE</option>
                    </select>
                </div>
                <div style="padding-bottom:1px;">
                    <button type="submit" class="btn btn-primary">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                            <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Send
                    </button>
                </div>
            </div>
        </form>
        <p class="hint">
            <span class="hint-dot"></span>
            Token must be a valid JWT with three dot-separated parts
        </p>
    </div>

    <!-- POST / PUT Data Form Card -->
    <div class="card" id="data-form-container">
        <div class="card-title" id="data-form-title">Product data</div>
        <div id="fields-container"></div>
        <div style="margin-top: 12px;">
            <button type="button" id="add-field-btn" class="btn btn-ghost" style="font-size:13px; padding:8px 14px;">
                + Add field
            </button>
        </div>
        <div class="form-actions">
            <button type="button" id="send-data-btn" class="btn btn-primary">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Send data
            </button>
            <button type="button" id="cancel-data-btn" class="btn btn-danger">Cancel</button>
        </div>
    </div>

    <!-- Table Section -->
    <div class="card" id="data-table-section">
        <div class="table-header">
            <div class="table-title">
                Results
                <span class="record-count" id="record-count">0</span>
            </div>
            <button class="close-btn" onclick="closeTable()">✕</button>
        </div>
        <div class="table-scroll">
            <table id="displayData"></table>
        </div>
    </div>

    <script src="productAPI.js"></script>
</body>
</html>
